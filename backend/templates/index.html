<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>
    <style>
        body { font-family: Arial; padding: 40px; background: #f5f5f5; }
        .container { max-width: 700px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        button { padding: 10px 20px; background: black; color: white; border: none; cursor: pointer; margin-top: 10px; }
        textarea, input { width: 100%; margin: 10px 0; padding: 10px; }
        .result { margin-top: 20px; }
        .section { margin-top: 20px; }
        .loading { color: blue; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 AI Resume Analyzer</h2>

    <div class="section">
        <textarea id="resume_text" placeholder="Paste resume text here..." rows="10"></textarea>
    </div>

    <div class="section">
        <input type="file" id="file">
        <button onclick="uploadResume()">Upload Resume</button>
    </div>

    <div class="section">
        <input type="number" id="age" placeholder="Age">
        <input type="number" step="0.01" id="cgpa" placeholder="CGPA">
    </div>

    <button onclick="analyze()">Analyze</button>

    <div class="result" id="result"></div>
</div>

<script>

async function uploadResume() {
    let fileInput = document.getElementById("file").files[0];

    if (!fileInput) {
        alert("Please select a file");
        return;
    }

    let formData = new FormData();
    formData.append("file", fileInput);

    document.getElementById("result").innerHTML = "<p class='loading'>Uploading & extracting...</p>";

    let response = await fetch("/api/upload/", {
        method: "POST",
        body: formData
    });

    let data = await response.json();

    if (data.text_preview) {
        document.getElementById("resume_text").value = data.text_preview;
        document.getElementById("result").innerHTML = "<p>✅ Resume uploaded & extracted successfully</p>";
    } else {
        document.getElementById("result").innerHTML = "<p style='color:red'>" + JSON.stringify(data) + "</p>";
    }
}

async function analyze() {
    let fileInput = document.getElementById("file").files[0];
    let resumeText = document.getElementById("resume_text").value;

    if (!fileInput && !resumeText.trim()) {
        alert("Upload file or paste resume text");
        return;
    }

    let formData = new FormData();

    if (fileInput) {
        formData.append("file", fileInput);
    } else {
        formData.append("resume_text", resumeText);
    }

    formData.append("age", document.getElementById("age").value || 0);
    formData.append("cgpa", document.getElementById("cgpa").value || 0);

    document.getElementById("result").innerHTML = "<p class='loading'>Analyzing resume...</p>";

    let response = await fetch("/api/analyze/", {
        method: "POST",
        body: formData
    });

    let data = await response.json();

    if (data.error) {
        document.getElementById("result").innerHTML = "<p style='color:red'>" + data.error + "</p>";
        return;
    }

    document.getElementById("result").innerHTML = `
        <h3>Score: ${data.score}%</h3>
        <h4>Status: ${data.selected ? "✅ Selected" : "❌ Rejected"}</h4>
        <p><b>Skills:</b> ${data.skills.length ? data.skills.join(", ") : "No skills detected"}</p>
    `;
}

</script>

</body>
</html>
