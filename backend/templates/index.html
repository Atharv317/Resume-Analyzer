<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>
    <style>
        body {
            font-family: Arial;
            padding: 40px;
            background: #f5f7fa;
        }

        .container {
            max-width: 750px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        button {
            padding: 10px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            border-radius: 6px;
            width: 100%;
        }

        button:hover {
            background: #333;
        }

        textarea, input {
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
        }

        .success { background: #e6ffed; }
        .error { background: #ffe6e6; }

        .tag {
            display: inline-block;
            background: #e0e0e0;
            padding: 5px 8px;
            margin: 3px;
            border-radius: 5px;
            font-size: 12px;
        }

        .score-bar {
            height: 8px;
            border-radius: 5px;
            margin-top: 10px;
        }

        .small {
            font-size: 12px;
            color: gray;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 AI Resume Analyzer</h2>

    <textarea id="resume_text" placeholder="Paste resume text here..." rows="10"></textarea>

    <input type="file" id="file">
    <button onclick="uploadResume()">Upload Resume</button>

    <input type="number" id="age" placeholder="Age (optional)">
    <button onclick="analyze()">Analyze Resume</button>

    <div class="result" id="result"></div>
</div>

<script>

function cleanText(text) {
    return text.replace(/<[^>]*>/g, " ").replace(/\s+/g, " ").trim();
}

function getScoreColor(score) {
    if (score >= 70) return "green";
    if (score >= 50) return "orange";
    return "red";
}

function formatExperience(exp) {
    if (!exp) return "0";
    return exp < 1 ? Math.round(exp * 12) + " months" : exp + " yrs";
}

function getDecision(score) {
    if (score >= 65) return "✅ Strong Candidate";
    if (score >= 50) return "👍 Good Candidate";
    if (score >= 40) return "⚠️ Needs Improvement";
    return "❌ Weak Profile";
}

async function uploadResume() {
    let fileInput = document.getElementById("file").files[0];

    if (!fileInput) {
        alert("Please select a file");
        return;
    }

    let formData = new FormData();
    formData.append("file", fileInput);

    document.getElementById("result").innerHTML = "<p>Uploading...</p>";

    try {
        let response = await fetch("/api/upload/", {
            method: "POST",
            body: formData
        });

        let data = await response.json();

        if (data.text_preview) {
            document.getElementById("resume_text").value = cleanText(data.text_preview);
            document.getElementById("result").innerHTML =
                "<div class='result success'>✅ Uploaded successfully</div>";
        } else {
            throw new Error();
        }

    } catch {
        document.getElementById("result").innerHTML =
            "<div class='result error'>❌ Upload failed</div>";
    }
}

async function analyze() {
    let fileInput = document.getElementById("file").files[0];
    let resumeText = cleanText(document.getElementById("resume_text").value);

    if (!fileInput && !resumeText) {
        document.getElementById("result").innerHTML =
            "<div class='result error'><h3>❌ Please upload or paste resume</h3></div>";
        return;
    }

    let formData = new FormData();

    if (fileInput) formData.append("file", fileInput);
    else formData.append("resume_text", resumeText);

    let age = document.getElementById("age").value;
    if (age) formData.append("age", age);

    document.getElementById("result").innerHTML =
        "<p>Analyzing resume...</p>";

    try {
        let response = await fetch("/api/analyze/", {
            method: "POST",
            body: formData
        });

        let data = await response.json();

        if (data.error) {
            document.getElementById("result").innerHTML =
                `<div class='result error'><h3>❌ ${data.error}</h3></div>`;
            return;
        }

        let extracted = data.extracted || {};
        let score = data.score || 0;
        let color = getScoreColor(score);

        let skillsHTML = (data.skills || [])
            .map(s => `<span class="tag">${s}</span>`)
            .join(" ");

        let expText = formatExperience(extracted.experience_years);
        let decision = getDecision(score);

        let borderline = "";
        if (data.confidence_level === "Medium" && score >= 40) {
            borderline = "<p style='color:orange'>⚠️ Close to selection</p>";
        }

        document.getElementById("result").innerHTML = `
            <div class='result success'>
                <h3 style="color:${color}">Score: ${score}%</h3>
                <div class="score-bar" style="width:${score}%; background:${color};"></div>

                <h4>${decision}</h4>
                <p><b>Confidence:</b> ${data.confidence_level}</p>
                <p class="small">Probability: ${data.probability}</p>

                ${borderline}

                <p><b>Skills:</b><br>${skillsHTML || "No skills detected"}</p>

                <hr/>

                <h4>📊 Extracted Data</h4>
                <p>Projects: ${extracted.projects ?? 0}</p>
                <p>Internships: ${extracted.internships ?? 0}</p>
                <p>Experience: ${expText}</p>
                <p>CGPA: ${extracted.cgpa ?? 0}</p>
            </div>
        `;

    } catch {
        document.getElementById("result").innerHTML =
            "<div class='result error'><h3>❌ Server error</h3></div>";
    }
}

</script>

</body>
</html>
